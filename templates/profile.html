{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}
<div class="card p-4" style="max-width:500px;margin:auto;">
  <h4 class="mb-3"><i class="bi bi-person-circle text-primary"></i> Profile</h4>
  <form method="POST" action="{{ url_for('auth.profile') }}">
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" name="name" class="form-control" value="{{ current_user.name }}">
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" value="{{ current_user.email }}" disabled>
    </div>
    <div class="mb-3">
      <label class="form-label">Role</label>
      <input type="text" class="form-control" value="{{ current_user.role }}" disabled>
    </div>
    <button type="submit" class="btn btn-primary w-100">Update Profile</button>
  </form>
</div>
{% endblock %}
